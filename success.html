<!DOCTYPE html>
<html>
<head>
<title>Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0b0b0b;
color:white;
text-align:center;
font-family:Arial;
margin:0;
padding:0;
overflow:hidden;
}

h1{color:#ff3c3c;}

#timer{
color:#00ffcc;
font-size:30px;
}

/* ⭐ IMAGE BOX (IMPROVED) */
.reward-box{
margin:20px auto;
width:85%;
background:#1c1c1c;
padding:15px;
border-radius:15px;
box-shadow:0 0 15px rgba(255,60,60,0.3);
}

.reward-box img{
width:100%;
border-radius:12px;
border:2px solid #ff3c3c;
}

.reward-title{
color:#00ffcc;
margin-top:10px;
font-size:14px;
}

/* Quotes */
.quotes{
margin:15px auto;
background:#111;
padding:10px;
border-radius:10px;
color:#00ffcc;
font-size:14px;
width:85%;
}

/* Buttons */
.btns{
margin-top:20px;
}

button{
padding:10px;
width:40%;
margin:5px;
border:none;
border-radius:5px;
color:white;
font-size:14px;
}

.home{background:#ff3c3c;}
.share{background:#00ffcc;color:black;}
</style>
</head>

<body>

<h1>⏳ Processing Reward...</h1>
<h2 id="timer">5</h2>

<script>
let t=5;
let rewardImg=localStorage.getItem("rewardImg") || "img1.jpg";

let x=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;

if(t==0){
clearInterval(x);

document.body.innerHTML=`
<h1>🎉 Reward Claimed Successfully</h1>

<!-- ⭐ IMAGE IN BOX -->
<div class="reward-box">
<img src="${rewardImg}">
<div class="reward-title">Your Claimed Reward Item</div>
</div>

<div class="quotes">
“Victory belongs to legends.”<br>
“Keep playing. Keep winning.”<br>
“Your reward is ready.”
</div>

<div class="btns">
<button class="home" onclick="location.href='index.html'">🏠 Home</button>
<button class="share" onclick="shareSite()">🔗https://ravin-cyber.github.io/Gamer-zone/index.html share</button>
</div>
`;

/* blast effect */
let blast=document.createElement("div");
blast.style.cssText="position:fixed;top:50%;left:50%;width:10px;height:10px;background:red;border-radius:50%;transform:translate(-50%,-50%);animation:boom 1s forwards;";
document.body.appendChild(blast);

/* animation */
let style=document.createElement("style");
style.innerHTML=`
@keyframes boom{
0%{transform:translate(-50%,-50%) scale(1);opacity:1;}
100%{transform:translate(-50%,-50%) scale(50);opacity:0;}
}`;
document.head.appendChild(style);

}
},1000);

/* SHARE */
function shareSite(){
if(navigator.share){
navigator.share({
title:"GameZone Rewards",
text:"Check out this awesome reward site!",
url:window.location.href
});
}else{
alert("Sharing not supported");
}
}
</script>

</body>
</html>
