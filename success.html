<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Success | Gamer Zone</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
    text-align: center;
}

/* FULL SCREEN CONTAINER */
.container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* HEADER */
.header {
    padding: 10px;
    background: #111;
    font-size: 14px;
    color: gold;
}

/* DIALOGUE */
.dialogue {
    margin-top: 10px;
    font-size: 16px;
    color: #ccc;
}

/* TIMER */
.timer {
    margin: 10px;
    font-size: 18px;
    color: gold;
}

/* IMAGE BOX */
.image-box {
    width: 220px;
    height: 220px;
    margin: 15px auto;
    border: 3px solid gold;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 25px gold;
}

.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: 90%;
    margin: auto;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.gallery img:hover {
    transform: scale(1.1);
}

/* BUTTONS */
.btn {
    padding: 10px 15px;
    margin: 8px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.home { background: green; color: white; }
.share { background: blue; color: white; }

/* FOOTER */
.footer {
    background: #111;
    padding: 10px;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        ⭐ OFFICIAL GAMER ZONE REWARDS SITE ⭐
    </div>

    <!-- DIALOGUE -->
    <div class="dialogue">
        🎮 Congratulations! You successfully claimed your reward.
    </div>

    <!-- TIMER -->
    <div class="timer">
        ⏳ Auto verification in: <span id="time">10</span>s
    </div>

    <!-- MAIN IMAGE -->
    <div class="image-box">
        <img id="claimedImg" src="img17.jpg">
    </div>


    <!-- BUTTONS -->
    <div>
        <button class="btn home" onclick="goHome()">🏠 Home</button>
        <button class="btn share" onclick="shareLink()">📤 Share</button>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        © 2026 Gamer Zone. All Rights Reserved. | Official Site from garena.
    </div>

</div>

<!-- SOUND -->
<audio id="sound">
    <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<script>

let timeLeft = 10;

// TIMER
let timer = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
        clearInterval(timer);

        confetti({
            particleCount: 300,
            spread: 160,
            origin: { y: 0.6 }
        });

        if (navigator.vibrate) {
            navigator.vibrate([200,100,200]);
        }
    }
}, 1000);

// CHANGE IMAGE
function changeImg(src) {
    document.getElementById("claimedImg").src = src;

    if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100]);
    }

    document.getElementById("sound").play();

    confetti({
        particleCount: 150,
        spread: 100,
        origin: { y: 0.6 }
    });
}

// HOME
function goHome() {
    window.location.href = "index.html";
}

// SHARE (YOUR OFFICIAL SITE)
function shareLink() {
    let url = "https://ravin-cyber.github.io/Gamer-zone/";

    if (navigator.share) {
        navigator.share({
            title: "Gamer Zone Official Reward",
            text: "I just claimed a reward on Gamer Zone!",
            url: url
        });
    } else {
        alert("Copy link: " + url);
    }
}

// LOAD EFFECT
window.onload = function () {
    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });

    if (navigator.vibrate) {
        navigator.vibrate(300);
    }

    document.getElementById("sound").play();
};

</script>

</body>
</html>
