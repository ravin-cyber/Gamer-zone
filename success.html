<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Success Page</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

/* TIMER */
.timer {
    font-size: 20px;
    margin-top: 10px;
    color: gold;
    font-weight: bold;
}

/* SUCCESS BOX */
.success-box {
    padding: 20px;
}

/* BIG IMAGE */
.image-box {
    width: 220px;
    height: 220px;
    margin: 15px auto;
    border: 3px solid gold;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 25px gold;
}

.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: 90%;
    margin: 20px auto;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.gallery img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 10px gold;
}

/* BUTTONS */
.btn {
    display: inline-block;
    padding: 10px 15px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.home-btn {
    background: green;
    color: white;
}

.share-btn {
    background: blue;
    color: white;
}
</style>
</head>

<body>

<div class="success-box">

    <h2>🎉 Claim Successful!</h2>

    <!-- TIMER -->
    <div class="timer">
        ⏳ Time Left: <span id="time">10</span>s
    </div>

    <!-- BIG IMAGE -->
    <div class="image-box">
        <img id="claimedImg" src="img1.jpg">
    </div>

    <p>Tap image to change reward</p>

    <!-- GALLERY -->
    <div class="gallery">
        <img src="img1.jpg" onclick="changeImg(this.src)">
        <img src="img2.jpg" onclick="changeImg(this.src)">
        <img src="img3.jpg" onclick="changeImg(this.src)">
        <img src="img4.jpg" onclick="changeImg(this.src)">
        <img src="img5.jpg" onclick="changeImg(this.src)">
        <img src="img6.jpg" onclick="changeImg(this.src)">
        <img src="img7.jpg" onclick="changeImg(this.src)">
        <img src="img8.jpg" onclick="changeImg(this.src)">
        <img src="img9.jpg" onclick="changeImg(this.src)">
        <img src="img10.jpg" onclick="changeImg(this.src)">
        <img src="img11.jpg" onclick="changeImg(this.src)">
        <img src="img12.jpg" onclick="changeImg(this.src)">
        <img src="img13.jpg" onclick="changeImg(this.src)">
        <img src="img14.jpg" onclick="changeImg(this.src)">
        <img src="img15.jpg" onclick="changeImg(this.src)">
        <img src="img16.jpg" onclick="changeImg(this.src)">
    </div>

    <!-- BUTTONS -->
    <button class="btn home-btn" onclick="goHome()">🏠 Home</button>
    <button class="btn share-btn" onclick="shareLink()">📤 Share</button>

</div>

<!-- SOUND -->
<audio id="sound">
    <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<script>

let timeLeft = 10;

// TIMER
let timer = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
        clearInterval(timer);

        confetti({
            particleCount: 300,
            spread: 150,
            origin: { y: 0.6 }
        });

        if (navigator.vibrate) {
            navigator.vibrate([200,100,200]);
        }
    }
}, 1000);

// CHANGE IMAGE
function changeImg(src) {
    document.getElementById("claimedImg").src = src;

    if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100]);
    }

    document.getElementById("sound").play();

    confetti({
        particleCount: 150,
        spread: 100,
        origin: { y: 0.6 }
    });
}

// HOME BUTTON
function goHome() {
    window.location.href = "index.html";
}

// SHARE BUTTON (YOUR LINK ADDED)
function shareLink() {
    let url = "https://ravin-cyber.github.io/Gamer-zone/";

    if (navigator.share) {
        navigator.share({
            title: "Gamer Zone Reward",
            text: "I just claimed a reward!",
            url: url
        });
    } else {
        alert("Copy link: " + url);
    }
}

// AUTO LOAD EFFECT
window.onload = function () {
    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });

    if (navigator.vibrate) {
        navigator.vibrate(300);
    }

    document.getElementById("sound").play();
};

</script>

</body>
            </html>
