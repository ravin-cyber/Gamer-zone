<!DOCTYPE html>
<html>
<head>
<title>Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0b0b0b;
color:white;
text-align:center;
font-family:Arial;
margin:0;
padding:0;
overflow:hidden;
}

/* Center content */
.container{
margin-top:120px;
}

h1{color:#ff3c3c;}

/* Timer */
#timer{
color:#00ffcc;
font-size:30px;
}

/* Blast effect */
.blast{
position:fixed;
top:50%;
left:50%;
width:10px;
height:10px;
background:red;
border-radius:50%;
transform:translate(-50%,-50%);
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:translate(-50%,-50%) scale(1);opacity:1;}
100%{transform:translate(-50%,-50%) scale(50);opacity:0;}
}

/* Confetti */
.confetti{
position:fixed;
width:8px;
height:8px;
background:yellow;
top:-10px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<div class="container">

<h1>⏳ Processing Reward...</h1>
<h2 id="timer">5</h2>

<div id="msg">Please wait...</div>

</div>

<script>

// TIMER
let t = 5;
let x = setInterval(()=>{
t--;
document.getElementById("timer").innerText = t;

if(t == 0){
clearInterval(x);

/* SUCCESS TEXT */
document.body.innerHTML = `
<h1>🎉 Reward Claimed Successfully</h1>
<p style="color:#00ffcc;">Congratulations Player!</p>
`;

/* BLAST EFFECT */
let blast = document.createElement("div");
blast.classList.add("blast");
document.body.appendChild(blast);

/* CONFETTI */
for(let i=0;i<30;i++){
let conf = document.createElement("div");
conf.classList.add("confetti");
conf.style.left = Math.random()*100 + "vw";
conf.style.background = ["red","yellow","blue","#00ffcc"][Math.floor(Math.random()*4)];
conf.style.animationDuration = (2+Math.random()*3)+"s";
document.body.appendChild(conf);
}
}

},1000);

</script>

</body>
</html>
