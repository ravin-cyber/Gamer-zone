<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<title>Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0b0b0b;
color:white;
text-align:center;
font-family:Arial;
margin:0;
padding:0;
overflow:hidden;
}

h1{color:#ff3c3c;}

#timer{color:#00ffcc;font-size:30px;}

.reward-box{
margin:20px auto;
width:85%;
background:#1c1c1c;
padding:15px;
border-radius:15px;
box-shadow:0 0 15px rgba(255,60,60,0.3);
}

.reward-box img{
width:100%;
border-radius:12px;
border:2px solid #ff3c3c;
}

.quotes{
margin:15px auto;
background:#111;
padding:10px;
border-radius:10px;
color:#00ffcc;
font-size:14px;
width:85%;
}

.btns{margin-top:20px;}

button{
padding:10px;
width:40%;
margin:5px;
border:none;
border-radius:5px;
color:white;
font-size:14px;
}

.home{background:#ff3c3c;}
.share{background:#00ffcc;color:black;}
</style>
</head>
  <script>
window.onload = function () {
    // Blast effect (confetti)
    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });

    // Extra burst effect
    setTimeout(() => {
        confetti({
            particleCount: 100,
            angle: 60,
            spread: 80,
            origin: { x: 0 }
        });
    }, 300);

    setTimeout(() => {
        confetti({
            particleCount: 100,
            angle: 120,
            spread: 80,
            origin: { x: 1 }
        });
    }, 600);
};
  </script>

<body>

<h1>⏳ Processing Reward...</h1>
<h2 id="timer">5</h2>

<audio id="winsound" src="win.mp3"></audio>

<script>

let t=5;
let rewardImg=localStorage.getItem("rewardImg") || "img1.jpg";

let x=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;

if(t==0){
clearInterval(x);

/* 🔊 SOUND */
document.getElementById("winsound").play();

/* 📳 VIBRATION EFFECT */
if(navigator.vibrate){
navigator.vibrate([200,100,200,100,400]); 
}

/* SCREEN */
document.body.innerHTML=`
<h1>🎉 Reward Claimed Successfully</h1>

<div class="reward-box">
<img src="${rewardImg}">
<div style="color:#00ffcc;margin-top:10px;">Your Claimed Reward Item</div>
</div>

<div class="quotes">
“Victory belongs to legends.”<br>
“Keep playing. Keep winning.”<br>
“Reward unlocked successfully.”
</div>

<div class="btns">
<button class="home" onclick="goHome()">🏠 Home</button>
<button class="share" onclick="shareSite()">🔗 Share</button>
</div>
`;

}
},1000);

/* HOME */
function goHome(){
window.location.href="index.html";
}

/* SHARE */
function shareSite(){
if(navigator.share){
navigator.share({
title:"GameZone Rewards",
text:"Check this awesome reward site!",
url:window.location.href
});
}else{
alert("Sharing not supported on this device");
}
}
</script>

</body>
</html>
