<!DOCTYPE html>
<html>
<head>
<title>Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0b0b0b;
color:white;
text-align:center;
font-family:Arial;
margin:0;
padding:0;
overflow:hidden;
}

.container{
margin-top:80px;
}

h1{color:#ff3c3c;}

#timer{
color:#00ffcc;
font-size:30px;
}

/* Claimed Image Box */
.reward-box{
margin:20px auto;
width:80%;
background:#1c1c1c;
padding:10px;
border-radius:10px;
}

.reward-box img{
width:100%;
border-radius:10px;
}

/* Quotes */
.quotes{
margin:15px auto;
background:#111;
padding:10px;
border-radius:10px;
color:#00ffcc;
font-size:14px;
width:85%;
}

/* Blast */
.blast{
position:fixed;
top:50%;
left:50%;
width:10px;
height:10px;
background:red;
border-radius:50%;
transform:translate(-50%,-50%);
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:translate(-50%,-50%) scale(1);opacity:1;}
100%{transform:translate(-50%,-50%) scale(50);opacity:0;}
}

/* Confetti */
.confetti{
position:fixed;
width:8px;
height:8px;
background:yellow;
top:-10px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<div class="container">

<h1>⏳ Processing Reward...</h1>
<h2 id="timer">5</h2>

</div>

<script>

let t = 5;

let rewardImg = localStorage.getItem("rewardImg") || "img1.jpg"; // default image

let x = setInterval(()=>{
t--;
document.getElementById("timer").innerText = t;

if(t == 0){
clearInterval(x);

/* SUCCESS SCREEN */
document.body.innerHTML = `
<h1>🎉 Reward Claimed Successfully</h1>

<div class="reward-box">
<img src="${rewardImg}">
<p style="color:#00ffcc;">Your Claimed Item</p>
</div>

<div class="quotes">
“Victory belongs to legends.”<br>
“Your reward is ready.”<br>
“Keep playing, keep winning.”
</div>
`;

/* BLAST */
let blast = document.createElement("div");
blast.classList.add("blast");
document.body.appendChild(blast);

/* CONFETTI */
for(let i=0;i<30;i++){
let conf = document.createElement("div");
conf.classList.add("confetti");
conf.style.left = Math.random()*100 + "vw";
conf.style.background = ["red","yellow","blue","#00ffcc"][Math.floor(Math.random()*4)];
conf.style.animationDuration = (2+Math.random()*3)+"s";
document.body.appendChild(conf);
}
}

},1000);

</script>

</body>
</html>
