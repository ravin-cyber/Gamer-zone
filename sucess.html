<!DOCTYPE html>
<html>
<head>
<title>Processing</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⏳ Processing Reward...</h1>

<h2 id="timer">5</h2>

<p>Do not close this page</p>

<script>
let t = 5;
let x = setInterval(() => {
  t--;
  document.getElementById("timer").innerText = t;
  if(t == 0){
    clearInterval(x);
    document.body.innerHTML = "<h1>✅ Reward Claimed Successfully (Demo)</h1>";
  }
}, 1000);
</script>

</body>
</html>
