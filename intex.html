<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamerzone</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
  text-align:center;
}

.page{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

h1{
  color:#ff0000;
}

.box{
  background:#1c1c1c;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

img{
  width:100%;
  border-radius:10px;
}

button{
  padding:12px;
  width:70%;
  border:none;
  background:red;
  color:white;
  border-radius:8px;
  font-size:16px;
  margin-top:15px;
}

input{
  padding:10px;
  width:80%;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

.success{
  color:#00ff88;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h1>GAMERZONE</h1>
<p>Free Skins, Emotes & Bundles</p>

<div class="box">
<img src="https://i.imgur.com/3ZQ3ZQm.jpg">
<p>Gun Skins</p>
</div>

<div class="box">
<img src="https://i.imgur.com/2yYayZk.jpg">
<p>Emotes</p>
</div>

<div class="box">
<img src="https://i.imgur.com/7yUvePI.jpg">
<p>Bundles</p>
</div>

<button onclick="go(2)">CLAIM NOW</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
<h1>ENTER UID</h1>

<input id="uid" placeholder="Enter Game UID">

<br>
<button onclick="go(3)">NEXT</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
<h1>SET TIME</h1>

<input type="time">

<br>
<button onclick="finish()">CONFIRM</button>

<div id="msg" class="success"></div>
</div>

<script>
function go(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page'+p).classList.add('active');
}

function finish(){
  document.getElementById("msg").innerHTML =
  "🎉 Congratulations! You claimed your reward successfully.";
}
</script>

</body>
</html>
