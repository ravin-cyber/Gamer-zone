<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gamerzone</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    .page {
      display: none;
      padding: 20px;
      min-height: 100vh;
    }

    .active {
      display: block;
    }

    h1 {
      color: red;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: red;
      color: white;
      font-size: 16px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    .success {
      margin-top: 20px;
      color: #00ff7f;
      font-size: 18px;
    }
  </style>
</head>

<body>

<!-- PAGE 1 -->
<div id="p1" class="page active">
  <h1>GAMERZONE</h1>
  <p>Claim Gun Skins, Emotes & Bundles</p>

  <div class="grid">
    <div class="card">
      <img src="https://i.imgur.com/3ZQ3ZQm.jpg">
      <p>Gun Skin</p>
    </div>

    <div class="card">
      <img src="https://i.imgur.com/2yYayZk.jpg">
      <p>Emote</p>
    </div>

    <div class="card">
      <img src="https://i.imgur.com/7yUvePI.jpg">
      <p>Bundle</p>
    </div>

    <div class="card">
      <img src="https://i.imgur.com/8Km9tLL.jpg">
      <p>Reward</p>
    </div>
  </div>

  <button onclick="go(2)">Claim Now</button>
</div>

<!-- PAGE 2 -->
<div id="p2" class="page">
  <h1>Enter Game UID</h1>
  <input id="uid" placeholder="Enter UID"/>
  <br>
  <button onclick="go(3)">Next</button>
</div>

<!-- PAGE 3 -->
<div id="p3" class="page">
  <h1>Set Time</h1>
  <input type="time" id="time"/>
  <br>
  <button onclick="showSuccess()">Confirm</button>

  <div id="msg" class="success" style="display:none;">
    🎉 Congratulations! You have successfully claimed your reward.
  </div>
</div>

<script>
function go(page){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('p' + page).classList.add('active');
}

function showSuccess(){
  document.getElementById('msg').style.display = 'block';
}
</script>

</body>
</html>
