  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://jetwvplkvkwkcetqswcj.supabase.co";
const supabaseKey = "sb_publishable_GZ37ioD42qB74R4skBs8fg_XVVOYWyK";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// STEP 1: Send OTP
async function sendOTP() {
  const email = document.getElementById("email").value;

  const { data, error } = await supabase.auth.signInWithOtp({
    email: email
  });

  if (error) {
    alert(error.message);
  } else {
    alert("OTP sent to your email!");
  }
}

// STEP 2: Verify OTP
async function verifyOTP() {
  const email = document.getElementById("email").value;
  const otp = document.getElementById("otp").value;

  const { data, error } = await supabase.auth.verifyOtp({
    email: email,
    token: otp,
    type: "email"
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Login Successful!");
    window.location.href = "uid.html";
  }
}
</script>
  

  

<body>
  <input type="email" id="email" placeholder="Enter Email"><br><br>

<button onclick="sendOTP()">Send OTP</button><br><br>

<input type="text" id="otp" placeholder="Enter OTP"><br><br>

<button onclick="verifyOTP()">Verify & Login</button>
  
  <div class="login-box">
  <h2>Login</h2>

  
  

<div class="box">

  <h2>🎮 GameZone Login</h2>

  <input type="text" id="user" placeholder="Enter gmail">
  <input type="password" id="pass" placeholder="Enter Password">

  <button onclick="login()">LOGIN</button>

  <p>Access your Gamer Reward System</p>

</div>

<script>
function login(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(user == "" || pass == ""){
    alert("Please fill all fields");
    return;
  }

  // redirect to next page
  window.location.href = "uid.html";
}
</script>

</body>
