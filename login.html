<!DOCTYPE html>
<html>
<head>
<title>Gamerzone Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

/* SAME BACKGROUND STYLE AS FIRST PAGE */
body{
  height:100vh;
  width:100vw;
  background: url("bg.jpg") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
  color:white;
}

/* DARK OVERLAY (same feel as index page) */
body::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:0;
}

/* CENTER BOX */
.login-box{
  position:relative;
  z-index:1;
  width:90%;
  max-width:360px;
  margin:120px auto 0;
  padding:25px;
  background:rgba(0,0,0,0.7);
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,255,0,0.2);
}

h2{
  margin-bottom:20px;
  color:#00ff66;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  outline:none;
  font-size:14px;
}

/* NEXT BUTTON (BOTTOM FIXED) */
.next-btn{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  max-width:320px;
  padding:14px;
  background:linear-gradient(90deg, #00ff66, #00cc44);
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  z-index:2;
  box-shadow:0 0 10px rgba(0,255,0,0.4);
}

.next-btn:hover{
  transform:translateX(-50%) scale(1.03);
}
</style>

</head>

<body>

<div class="login-box">
  <h2>Gamerzone Login</h2>

  <input type="text" placeholder="Enter Username">
  <input type="password" placeholder="Enter Password">
</div>

<!-- NEXT BUTTON -->
<button class="next-btn" onclick="goNext()">NEXT</button>

<script>
function goNext(){
  window.location.href = "uid.html";
}
</script>

</body>
</html>
