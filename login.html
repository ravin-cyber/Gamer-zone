<!DOCTYPE html>
<html>
<head>
<title>Login - GameZone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0b0b0b;
color:white;
text-align:center;
font-family:Arial;
margin:0;
}

h2{
color:#ff3c3c;
margin-top:30px;
}

.box{
background:#1c1c1c;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(255,60,60,0.4);
}

input{
width:90%;
padding:12px;
margin:8px;
border:none;
border-radius:5px;
font-size:15px;
}

button{
width:95%;
padding:12px;
margin-top:10px;
background:#ff3c3c;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff1f1f;
}
</style>
</head>

<body>

<h2>🔥 Login to Claim Reward</h2>

<div class="box">

<input type="email" id="email" placeholder="Enter Gmail">

<input type="password" placeholder="Enter Password (optional)">

<button onclick="sendOTP()">Send OTP</button>

<input type="text" id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify & Continue</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://jetwvplkvkwkcetqswcj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtdHJueHRvZ3phaGV4eHVoam1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTY3NDcsImV4cCI6MjA5MTM5Mjc0N30.wrYgiSRTPq_QVOWg-cd29XKT-TPuxrMwFRznq84h_ks"
);

async function sendOTP() {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Enter email first!");
    return;
  }

  const { error } = await supabaseClient.auth.signInWithOtp({
    email: email
  });

  if (error) {
    alert("Error: " + error.message);
  } else {
    alert("OTP sent! Check email 📩");
  }
}

async function verifyOTP() {
  const email = document.getElementById("email").value;
  const otp = document.getElementById("otp").value;

  if (!otp) {
    alert("Enter OTP!");
    return;
  }

  const { error } = await supabaseClient.auth.verifyOtp({
    email: email,
    token: otp,
    type: "email"
  });

  if (error) {
    alert("Invalid OTP ❌");
  } else {
    alert("Login successful ✅");
    window.location.href = "uid.html";
  }
}
</script>

</body>
</html>
