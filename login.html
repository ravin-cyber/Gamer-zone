<!DOCTYPE html>
<html>
<head>
  <title>Gamer Zone Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      /* 🔴 REPLACE THIS WITH YOUR INDEX BACKGROUND */
      background: red;
      background-size: cover;
      background-position: center;

      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* LOGIN BOX */
    .box {
      background: rgba(255,255,255,0.92);
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 12px rgba(0,0,0,0.3);
    }

    h1 {
      color: white;
      margin-bottom: 20px;
      text-shadow: 0 0 5px black;
    }

    h2 {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #333;
    }

    /* FOOTER */
    .footer {
      position: absolute;
      bottom: 10px;
      text-align: center;
      color: white;
      font-size: 12px;
      text-shadow: 0 0 3px black;
    }

    .links {
      margin-top: 10px;
      font-size: 12px;
    }

    .links a {
      color: blue;
      cursor: pointer;
      margin: 0 5px;
    }

    /* POPUP */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      text-align: center;
    }

    .popup-content button {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🎮 Gamer Zone Login</h1>

<div class="box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>

  <div class="links">
    <a onclick="openPolicy()">Privacy Policy</a>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Gamer Zone. All Rights Reserved.GARENA OFFICIAL
</div>

<!-- PRIVACY POLICY POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>Privacy Policy</h3>
    <p>
      We respect your privacy. Your login data is stored securely
      for game access only and will not be shared with third parties.
    </p>
    <button onclick="closePolicy()">Close</button>
  </div>
</div>

<script>
function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  // local storage only (no backend)
  localStorage.setItem("email", email);

  alert("Login Successful!");
  window.location.href = "uid.html";
}

function openPolicy() {
  document.getElementById("popup").style.display = "flex";
}

function closePolicy() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
