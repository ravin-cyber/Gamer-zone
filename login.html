<!DOCTYPE html>
<html>
<head>
  <title>Gamer Zone Login</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: radial-gradient(circle at top, #1a0000, #000000 60%),
                  linear-gradient(135deg, #ff0000 20%, #000000 80%);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,0,0,0.2), transparent 60%);
      pointer-events: none;
    }

    h1 {
      position: absolute;
      top: 20px;
      color: white;
      font-size: 22px;
      text-shadow: 0 0 10px red;
      width: 100%;
      text-align: center;
    }

    .box {
      width: 90%;
      max-width: 340px;
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255,0,0,0.5);
      z-index: 1;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #222;
    }

    .links {
      margin-top: 10px;
      font-size: 12px;
    }

    .links a {
      color: red;
      font-weight: bold;
      cursor: pointer;
    }

    .footer {
      position: absolute;
      bottom: 10px;
      color: white;
      font-size: 12px;
      text-align: center;
      width: 100%;
    }

    .popup {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 85%;
      max-width: 300px;
      text-align: center;
    }

    /* Google button bottom fix */
    .google-bottom {
      margin-top: 15px;
      z-index: 2;
    }
  </style>
</head>

<body>

<h1>🎮 Gamer Zone Login</h1>

<div class="box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>

  <div class="links">
    <a onclick="openPolicy()">Privacy Policy</a>
  </div>
</div>

<!-- 🔽 GOOGLE SIGN-IN MOVED TO BOTTOM -->
<div class="google-bottom">
  <div id="g_id_onload"
    data-client_id="808747398959-a77i36251ng9s7r12eajuot0hjsj6mat.apps.googleusercontent.com"
    data-callback="handleLogin">
  </div>

  <div class="g_id_signin" data-type="standard"></div>
</div>

<div class="footer">
  © 2026 Gamer Zone. All Rights Reserved | Garena International
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>Privacy Policy</h3>
    <p>Your data is used only for login access. We do not share it.</p>
    <button onclick="closePolicy()">Close</button>
  </div>
</div>

<script>
function redirectWithTimer() {
  setTimeout(() => {
    window.location.href = "uid.html";
  }, 3000); // 3 seconds delay
}

function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  localStorage.setItem("email", email);

  alert("Login Successful!");
  redirectWithTimer();
}

// GOOGLE LOGIN CALLBACK
function handleLogin(response) {
  const user = parseJwt(response.credential);

  alert("Welcome " + user.name);

  localStorage.setItem("email", user.email);

  redirectWithTimer();
}

function parseJwt (token) {
  var base64Url = token.split('.')[1];
  var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));

  return JSON.parse(jsonPayload);
}

function openPolicy() {
  document.getElementById("popup").style.display = "flex";
}

function closePolicy() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
