<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Zone Login</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
  }

  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #ff0000, #8b0000);
    color: white;
  }

  .container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .box {
    width: 90%;
    max-width: 350px;
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 12px;
    text-align: center;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 6px;
  }

  button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }

  .signup { background: #ffcc00; }
  .login { background: #00ff88; }
  .verify { background: #00aaff; }

  .msg {
    margin-top: 10px;
    font-size: 14px;
  }

  .info {
    font-size: 13px;
    margin-top: 10px;
    opacity: 0.9;
    line-height: 1.4;
  }

  footer {
    text-align: center;
    padding: 10px;
    font-size: 12px;
    background: rgba(0,0,0,0.4);
  }
</style>
</head>

<body>

<div class="container">

  <div class="box">

    <h2>Game Zone Login</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button class="signup" onclick="signup()">Sign Up</button>
    <button class="verify" onclick="sendOTP()">Send OTP (Email)</button>
    <button class="login" onclick="login()">Login</button>

    <div class="msg" id="msg"></div>

    <div class="info">
      ⚠️ Step 1: Sign up using email<br>
      📩 Step 2: Verify OTP sent to email<br>
      🔓 Step 3: Then login to continue<br>
    </div>

  </div>

</div>

<footer>
  © 2026 Game Zone. All Rights Reserved.
</footer>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendEmailVerification,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBblC_ucasWx0FcMcz2SEyIYxJrMMNEmw",
  authDomain: "game-zone-24df2.firebaseapp.com",
  projectId: "game-zone-24df2",
  storageBucket: "game-zone-24df2.appspot.com",
  messagingSenderId: "808747398959",
  appId: "1:808747398959:web:107c04c3544a88048413da",
  measurementId: "G-67CF0JJ7T6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
getAnalytics(app);

let user = null;


// SIGN UP
window.signup = function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then((res) => {
      user = res.user;
      document.getElementById("msg").innerText =
        "Account created! Now send OTP.";
    })
    .catch((err) => {
      document.getElementById("msg").innerText = err.message;
    });
};


// SEND OTP (EMAIL VERIFICATION)
window.sendOTP = function () {
  let currentUser = auth.currentUser;

  if (!currentUser) {
    document.getElementById("msg").innerText =
      "Please sign up or login first!";
    return;
  }

  sendEmailVerification(currentUser)
    .then(() => {
      document.getElementById("msg").innerText =
        "OTP sent to your email!";
    })
    .catch((err) => {
      document.getElementById("msg").innerText = err.message;
    });
};


// LOGIN (ONLY AFTER VERIFICATION)
window.login = function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((res) => {
      user = res.user;

      if (user.emailVerified) {
        document.getElementById("msg").innerText =
          "Login success! Redirecting...";

        setTimeout(() => {
          window.location.href = "uid.html";
        }, 1000);

      } else {
        document.getElementById("msg").innerText =
          "Please verify OTP sent to your email first!";
        sendEmailVerification(user);
      }
    })
    .catch((err) => {
      document.getElementById("msg").innerText = err.message;
    });
};

</script>

</body>
</html>
