<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Gamer zone Login</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
  }

  body {
    height: 100vh;
    background: url("background.jpg") no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .box {
    width: 90%;
    max-width: 350px;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 12px;
    color: white;
    text-align: center;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 6px;
  }

  button {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }

  .signup { background: #ffcc00; }
  .login { background: #00ff88; }
  .otp { background: #00aaff; }

  #msg {
    margin-top: 10px;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="box">

  <h2>Gamer zone Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button class="signup" onclick="signup()">Sign Up</button>
  <button class="login" onclick="login()">Login</button>
  <button class="otp" onclick="sendOTP()">Send Email OTP</button>

  <p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBblC_ucasWx0FcMcz2SEyIYxJrMMNEmw",
  authDomain: "game-zone-24df2.firebaseapp.com",
  projectId: "game-zone-24df2",
  storageBucket: "game-zone-24df2.appspot.com",
  messagingSenderId: "808747398959",
  appId: "1:808747398959:web:107c04c3544a88048413da"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


// SIGN UP
window.signup = function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Account created!";
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
};


// LOGIN
window.login = function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      let user = userCredential.user;

      if (user.emailVerified) {
        document.getElementById("msg").innerText = "Login success!";
        setTimeout(() => {
          window.location.href = "uid.html";
        }, 1000);
      } else {
        document.getElementById("msg").innerText =
          "Please verify OTP sent to email";
        sendEmailVerification(user);
      }
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
};


// SEND OTP (EMAIL VERIFICATION LINK)
window.sendOTP = function () {
  let user = auth.currentUser;

  if (user) {
    sendEmailVerification(user)
      .then(() => {
        document.getElementById("msg").innerText =
          "OTP sent to email!";
      });
  } else {
    document.getElementById("msg").innerText =
      "Login first!";
  }
};

</script>

</body>
</html>
