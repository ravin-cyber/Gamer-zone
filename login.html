<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gamer Zone Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #8B0000, black);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      margin-top: 70px;
      padding: 20px;
    }

    input {
      width: 85%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 90%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: gold;
      font-weight: bold;
      cursor: pointer;
    }

    .footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      font-size: 12px;
      opacity: 0.6;
    }

    .dialogue {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🎮 Gamer Zone</h2>
  <p>Login or Signup to Continue</p>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <div class="dialogue">
    💬 "Every reward needs a player — log in and win big!"
  </div>
</div>

<div class="footer">
  © 2026 Gamer Zone | All Rights Reserved
</div>

<script>
const supabase = window.supabase.createClient(
  "https://jetwvplkvkwkcetqswcj.supabase.co",
  "sb_publishable_vGeRfzqFeohO7ikkgfCD_g_Yu0ZC05I"
);

// 🔐 SIGNUP (sends OTP email)
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    alert("❌ " + error.message);
  } else {
    alert("✅ Signup successful! Check your email for OTP verification.");
  }
}

// 🔑 LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    alert("❌ " + error.message);
  } else {
    alert("🎉 Login successful!");
    window.location.href = "uid.html";
  }
}
</script>

</body>
  </html>
