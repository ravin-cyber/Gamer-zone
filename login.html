<!DOCTYPE html>
<html>
<head>
<title>GameZone Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* PAGE BACKGROUND (same as index.html) */
body{
  margin:0;
  font-family:Arial;
  background:red;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* LOGIN BOX */
.box{
  width:300px;
  background:black;
  padding:25px;
  border:2px solid white;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 15px black;
}

/* TITLE */
h2{
  margin-bottom:20px;
}

/* INPUT BOX */
input{
  width:90%;
  padding:10px;
  margin:10px 0;
  border:none;
  outline:none;
  border-radius:5px;
}

/* BUTTON */
button{
  width:95%;
  padding:12px;
  margin-top:10px;
  border:none;
  background:white;
  color:red;
  font-size:16px;
  font-weight:bold;
  border-radius:5px;
  cursor:pointer;
}

/* BUTTON HOVER */
button:hover{
  background:#ddd;
}

/* SMALL TEXT */
p{
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="box">

  <h2>🎮 GameZone Login</h2>

  <input type="text" id="user" placeholder="Enter Username">
  <input type="password" id="pass" placeholder="Enter Password">

  <button onclick="login()">LOGIN</button>

  <p>Access your Gamer Reward System</p>

</div>

<script>
function login(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(user == "" || pass == ""){
    alert("Please fill all fields");
    return;
  }

  // redirect to next page
  window.location.href = "uid.html";
}
</script>

</body>
</html>
