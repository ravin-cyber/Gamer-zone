<!DOCTYPE html>
<html>
<head>
  <title>Gamer Zone Login</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    /* 🎮 PRO GAMING BACKGROUND (INDEX STYLE) */
    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;

      /* Pro gaming neon background */
      background: radial-gradient(circle at top, #1a0000, #000000 60%),
                  linear-gradient(135deg, #ff0000 20%, #000000 80%);
      
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* glow effect overlay */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,0,0,0.2), transparent 60%);
      pointer-events: none;
    }

    /* TITLE */
    h1 {
      position: absolute;
      top: 20px;
      color: white;
      font-size: 22px;
      text-shadow: 0 0 10px red;
      text-align: center;
      width: 100%;
    }

    /* LOGIN BOX */
    .box {
      width: 90%;
      max-width: 340px;
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255,0,0,0.5);
      z-index: 1;
    }

    .box h2 {
      margin-bottom: 15px;
      color: black;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #222;
    }

    .links {
      margin-top: 10px;
      font-size: 12px;
    }

    .links a {
      color: red;
      font-weight: bold;
      cursor: pointer;
    }

    /* FOOTER */
    .footer {
      position: absolute;
      bottom: 10px;
      color: white;
      font-size: 12px;
      text-shadow: 0 0 5px black;
      text-align: center;
      width: 100%;
    }

    /* POPUP */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 85%;
      max-width: 300px;
      text-align: center;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 18px;
      }

      .box {
        padding: 18px;
      }
    }

  </style>
</head>

<body>

<h1>🎮 Gamer Zone Login</h1>

<div class="box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>

  <div class="links">
    <a onclick="openPolicy()">Privacy Policy</a>
  </div>
</div>

<div class="footer">
  © 2026 Gamer Zone. All Rights Reserved.| Garena International 
</div>

<!-- PRIVACY POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>Privacy Policy</h3>
    <p>
      Your data is used only for login access.
      We do not share or store it publicly.
    </p>
    <button onclick="closePolicy()">Close</button>
  </div>
</div>

<script>
function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  localStorage.setItem("email", email);

  alert("Login Successful!");
  window.location.href = "uid.html";
}

function openPolicy() {
  document.getElementById("popup").style.display = "flex";
}

function closePolicy() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
