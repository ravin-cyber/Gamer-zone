<!DOCTYPE html>
<html>
<head>
  <title>🎮 Gamer zone Login</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(red, black);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(0,0,0,0.7);
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 350px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .loginBtn {
      background: white;
      color: black;
    }

    .signupBtn {
      background: #ffcc00;
      color: black;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🎮 Gamer Zone Login</h2>

  <!-- UI login -->
  <input type="text" placeholder="Email">
  <input type="password" placeholder="Password">

  <button class="loginBtn">Login</button>

  <!-- SIGN UP BUTTON -->
  <button class="signupBtn" onclick="googleSignup()">
    Sign Up with Google
  </button>

  <!-- Google Login hidden trigger -->
  <div id="g_id_onload"
       data-client_id="YOUR_CLIENT_ID"
       data-callback="handleSignup"
       style="display:none;">
  </div>

</div>

<script>
function googleSignup() {
  // triggers Google login
  document.querySelector(".signupBtn").innerText = "Loading Google...";
  
  google.accounts.id.initialize({
    client_id: "YOUR_CLIENT_ID",
    callback: handleSignup
  });

  google.accounts.id.prompt();
}

function handleSignup(response) {
  const user = parseJwt(response.credential);

  alert("Signup Successful 🎉\nWelcome " + user.name);

  // redirect to login page
  window.location.href = "login.html";
}

function parseJwt (token) {
  var base64Url = token.split('.')[1];
  var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));

  return JSON.parse(jsonPayload);
}
</script>

</body>
</html>
