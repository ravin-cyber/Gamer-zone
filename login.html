<!DOCTYPE html>
<html>
<head>
<title>Login - GameZone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0b0b0b;
color:white;
text-align:center;
font-family:Arial;
margin:0;
padding:0;
}

h2{
color:#ff3c3c;
margin-top:40px;
}

.box{
background:#1c1c1c;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(255,60,60,0.5);
}

input{
width:90%;
padding:12px;
margin:10px;
border:none;
border-radius:5px;
font-size:16px;
}

button{
width:95%;
padding:12px;
background:#ff3c3c;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff1f1f;
}
</style>
</head>

<body>

<h2>🔥 Login to Claim Reward</h2>

<div class="box">
<input type="email" id="email" placeholder="Enter your email">

<button onclick="sendOTP()">Send OTP</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://jetwvplkvkwkcetqswcj.supabase.co",
  "sb_publishable_vGeRfzqFeohO7ikkgfCD_g_Yu0ZC05I"
);

async function sendOTP() {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Enter email first!");
    return;
  }

  const { error } = await supabaseClient.auth.signInWithOtp({
    email: email
  });

  if (error) {
    alert("Error: " + error.message);
  } else {
    alert("OTP sent! Check your email 📩");
  }
}
</script>

</body>
</html>
