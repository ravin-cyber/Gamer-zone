<!DOCTYPE html>
<html>
<head>
  <title>Gamer Zone Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    /* 🔴 FULL SCREEN RED + WHITE GAMING BACKGROUND */
    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;

      background: linear-gradient(135deg, red 50%, white 50%);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* TITLE */
    h1 {
      position: absolute;
      top: 20px;
      color: white;
      text-shadow: 0 0 8px black;
      font-size: 26px;
    }

    /* LOGIN BOX */
    .box {
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .box h2 {
      margin-bottom: 15px;
      color: black;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #333;
    }

    /* LINKS */
    .links {
      margin-top: 10px;
      font-size: 12px;
    }

    .links a {
      color: red;
      cursor: pointer;
      font-weight: bold;
    }

    /* FOOTER */
    .footer {
      position: absolute;
      bottom: 10px;
      color: black;
      font-size: 12px;
    }

    /* POPUP */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }
  </style>
</head>

<body>

<h1>🎮 Gamer Zone Login</h1>

<div class="box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>

  <div class="links">
    <a onclick="openPolicy()">Privacy Policy</a>
  </div>
</div>

<div class="footer">
  © 2026 Gamer Zone. All Rights Reserved.|Garena International 
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>Privacy Policy</h3>
    <p>
      Your data is used only for login access.
      We do not share or sell your information.
    </p>
    <button onclick="closePolicy()">Close</button>
  </div>
</div>

<script>
function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  localStorage.setItem("email", email);

  alert("Login Successful!");
  window.location.href = "uid.html";
}

function openPolicy() {
  document.getElementById("popup").style.display = "flex";
}

function closePolicy() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
