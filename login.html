<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff0000, #8b0000);
      color: white;
      text-align: center;
      padding-top: 60px;
    }

    .box {
      background: rgba(0,0,0,0.5);
      padding: 20px;
      width: 320px;
      margin: auto;
      border-radius: 12px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 95%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .signup { background: #ffcc00; }
    .login { background: #00ff88; }
    .verify { background: #00aaff; }

    #msg {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>Secure Login System</h2>

<div class="box">

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button class="signup" onclick="signup()">Sign Up</button>
  <button class="login" onclick="login()">Login</button>

  <button class="verify" onclick="verifyEmail()">Send Email OTP</button>

  <p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendEmailVerification,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";


// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBBblC_ucasWx0FcMcz2SEyIYxJrMMNEmw",
  authDomain: "game-zone-24df2.firebaseapp.com",
  projectId: "game-zone-24df2",
  storageBucket: "game-zone-24df2.appspot.com",
  messagingSenderId: "808747398959",
  appId: "1:808747398959:web:107c04c3544a88048413da",
  measurementId: "G-67CF0JJ7T6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
getAnalytics(app);

let currentUser = null;


// SIGN UP
window.signup = function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      currentUser = userCredential.user;
      document.getElementById("msg").innerText = "Account created!";
    })
    .catch((error) => {
      document.getElementById("msg").innerText = error.message;
    });
};


// LOGIN
window.login = function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      currentUser = userCredential.user;

      if (currentUser.emailVerified) {
        document.getElementById("msg").innerText = "Login success!";
        setTimeout(() => {
          window.location.href = "uid.html";
        }, 1000);
      } else {
        document.getElementById("msg").innerText =
          "Please verify your email first (OTP sent)";
        sendEmailVerification(currentUser);
      }
    })
    .catch((error) => {
      document.getElementById("msg").innerText = error.message;
    });
};


// SEND EMAIL OTP (VERIFICATION LINK)
window.verifyEmail = function () {
  let user = auth.currentUser;

  if (user) {
    sendEmailVerification(user)
      .then(() => {
        document.getElementById("msg").innerText =
          "Verification email sent!";
      })
      .catch((error) => {
        document.getElementById("msg").innerText = error.message;
      });
  } else {
    document.getElementById("msg").innerText = "Login first!";
  }
};


// CHECK LOGIN STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
  }
});

</script>

</body>
</html>
