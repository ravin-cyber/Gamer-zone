<!DOCTYPE html>
<html>
<head>
<title>GameZone Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* PAGE BACKGROUND (same as index.html) */
body{
  margin:0;
  font-family:Arial;
  background:red;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* LOGIN BOX */
.box{
  width:300px;
  background:black;
  padding:25px;
  border:2px solid white;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 15px black;
}

/* TITLE */
h2{
  margin-bottom:20px;
}

/* INPUT BOX */
input{
  width:90%;
  padding:10px;
  margin:10px 0;
  border:none;
  outline:none;
  border-radius:5px;
}

/* BUTTON */
button{
  width:95%;
  padding:12px;
  margin-top:10px;
  border:none;
  background:white;
  color:red;
  font-size:16px;
  font-weight:bold;
  border-radius:5px;
  cursor:pointer;
}

/* BUTTON HOVER */
button:hover{
  background:#ddd;
}

/* SMALL TEXT */
p{
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
}
</style>

</head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://jetwvplkvkwkcetqswcj.supabase.co";
const supabaseKey = "sb_publishable_GZ37ioD42qB74R4skBs8fg_XVVOYWyK";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
</script>
  <script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    document.getElementById("message").innerText = error.message;
  } else {
    document.getElementById("message").innerText = "Login Successful!";
    
    // redirect after login
    window.location.href = "uid.html";
  }
}
  </script>

<body>
  
  <div class="login-box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Enter Email" required>
  <input type="password" id="password" placeholder="Enter Password" required>

  <button onclick="login()">Login</button>

  <p id="message"></p>
  </div>

<div class="box">

  <h2>🎮 GameZone Login</h2>

  <input type="text" id="user" placeholder="Enter gmail">
  <input type="password" id="pass" placeholder="Enter Password">

  <button onclick="login()">LOGIN</button>

  <p>Access your Gamer Reward System</p>

</div>

<script>
function login(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(user == "" || pass == ""){
    alert("Please fill all fields");
    return;
  }

  // redirect to next page
  window.location.href = "uid.html";
}
</script>

</body>
</html>
