<!DOCTYPE html>
<html>
<head>
<title>GameZone Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, red, black);
  color:white;
}

/* Login box */
.box{
  width:300px;
  padding:25px;
  background: rgba(0,0,0,0.6);
  border:2px solid red;
  border-radius:15px;
  box-shadow:0 0 20px red;
  text-align:center;
}

/* Title */
h2{
  margin-bottom:20px;
  color:red;
}

/* Inputs */
input{
  width:90%;
  padding:10px;
  margin:10px 0;
  border:none;
  outline:none;
  border-radius:5px;
}

/* Button */
button{
  width:95%;
  padding:10px;
  margin-top:10px;
  background:red;
  border:none;
  color:white;
  font-size:16px;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:darkred;
}

/* Small text */
p{
  font-size:12px;
  opacity:0.7;
}
</style>

</head>

<body>

<div class="box">
  <h2>🎮 GameZone Login</h2>

  <input type="text" placeholder="Enter Username">
  <input type="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>

  <p>Welcome to Gamer Reward System</p>
</div>

<script>
function login(){
  // simple redirect to next page (UID page)
  window.location.href = "uid.html";
}
</script>

</body>
</html>
