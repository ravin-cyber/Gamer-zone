<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Login</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
  }

  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #ff0000, #8b0000);
    color: white;
  }

  .container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .box {
    width: 90%;
    max-width: 360px;
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 12px;
    text-align: center;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 6px;
    outline: none;
  }

  button {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }

  .send { background: #00ff88; }
  .verify { background: #00aaff; }

  #msg {
    margin-top: 10px;
    font-size: 14px;
  }

  .info {
    font-size: 12px;
    margin-top: 10px;
    opacity: 0.9;
    line-height: 1.4;
  }

  footer {
    text-align: center;
    padding: 10px;
    font-size: 12px;
    background: rgba(0,0,0,0.4);
  }
</style>
</head>

<body>

<div class="container">
  <div class="box">

    <h2>OTP Login</h2>

    <!-- PHONE INPUT -->
    <input type="text" id="phone" placeholder="+91XXXXXXXXXX">

    <!-- OTP INPUT BOX -->
    <input type="text" id="otp" placeholder="Enter OTP Code">

    <!-- BUTTONS -->
    <button class="send" onclick="sendOTP()">Send OTP</button>
    <button class="verify" onclick="verifyOTP()">Verify OTP & Login</button>

    <!-- MESSAGE -->
    <div id="msg"></div>

    <div class="info">
      📱 Step 1: Enter phone number<br>
      📩 Step 2: Click Send OTP<br>
      🔢 Step 3: Enter OTP in box<br>
      🔓 Step 4: Verify & Login
    </div>

    <div id="recaptcha-container"></div>

  </div>
</div>

<footer>
  © 2026 Game Zone. All Rights Reserved.
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithPhoneNumber,
  RecaptchaVerifier
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBblC_ucasWx0FcMcz2SEyIYxJrMMNEmw",
  authDomain: "game-zone-24df2.firebaseapp.com",
  projectId: "game-zone-24df2",
  storageBucket: "game-zone-24df2.appspot.com",
  messagingSenderId: "808747398959",
  appId: "1:808747398959:web:107c04c3544a88048413da",
  measurementId: "G-67CF0JJ7T6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
getAnalytics(app);

let confirmationResult;


// CAPTCHA (REQUIRED)
window.recaptchaVerifier = new RecaptchaVerifier(
  'recaptcha-container',
  {
    size: 'normal'
  },
  auth
);


// SEND OTP
window.sendOTP = function () {
  let phone = document.getElementById("phone").value;

  if (!phone) {
    document.getElementById("msg").innerText = "Enter phone number!";
    return;
  }

  signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
    .then((result) => {
      confirmationResult = result;
      document.getElementById("msg").innerText = "OTP sent successfully!";
    })
    .catch((error) => {
      document.getElementById("msg").innerText = error.message;
    });
};


// VERIFY OTP
window.verifyOTP = function () {
  let code = document.getElementById("otp").value;

  if (!code) {
    document.getElementById("msg").innerText = "Enter OTP!";
    return;
  }

  confirmationResult.confirm(code)
    .then((result) => {
      document.getElementById("msg").innerText =
        "Login success! Redirecting...";

      setTimeout(() => {
        window.location.href = "uid.html";
      }, 1000);

    })
    .catch(() => {
      document.getElementById("msg").innerText = "Invalid OTP!";
    });
};

</script>

</body>
</html>
