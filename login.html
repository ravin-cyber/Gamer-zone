<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gamer Zone Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #8B0000, #000000);
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

.container {
  margin-top: 70px;
  padding: 20px;
}

h1 {
  font-size: 28px;
}

p {
  font-size: 14px;
  opacity: 0.8;
}

input {
  width: 85%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

button {
  width: 90%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: gold;
  color: black;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: orange;
}

.dialogue {
  margin-top: 20px;
  font-size: 13px;
  opacity: 0.7;
}

.footer {
  position: fixed;
  bottom: 10px;
  width: 100%;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎮 Gamer Zone</h1>
  <p>Sign up & verify with OTP</p>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="sendOTP()">Sign Up & Send OTP</button>

  <input type="text" id="otp" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Verify OTP</button>

  <button onclick="login()">Login</button>

  <div class="dialogue">
    💬 "Victory begins with a login — claim your rewards now!"
  </div>
</div>

<div class="footer">
  © 2026 Gamer Zone | All Rights Reserved
</div>

<script>
const supabase = window.supabase.createClient(
  "https://jetwvplkvkwkcetqswcj.supabase.co",
  "sb_publishable_vGeRfzqFeohO7ikkgfCD_g_Yu0ZC05I"
);

// 📩 Send OTP
async function sendOTP() {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Enter email");
    return;
  }

  const { error } = await supabase.auth.signInWithOtp({
    email: email
  });

  if (error) {
    alert("❌ " + error.message);
  } else {
    alert("✅ OTP sent to your email");
  }
}

// 🔐 Verify OTP
async function verifyOTP() {
  const email = document.getElementById("email").value;
  const otp = document.getElementById("otp").value;

  if (!otp) {
    alert("Enter OTP");
    return;
  }

  const { error } = await supabase.auth.verifyOtp({
    email: email,
    token: otp,
    type: "email"
  });

  if (error) {
    alert("❌ " + error.message);
  } else {
    alert("🎉 Email verified successfully!");
  }
}

// 🔑 Login with password
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    alert("❌ " + error.message);
  } else {
    alert("🎉 Login successful!");
    window.location.href = "uid.html";
  }
}
</script>

</body>
</html>
