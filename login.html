<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GamerZone Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff0000, #1a0000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: rgba(0,0,0,0.85);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  width: 90%;
  max-width: 350px;
  box-shadow: 0 0 20px red;
}

input {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 95%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: red;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎮 GamerZone Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="sendOTP()">Send OTP</button>

  <input type="text" id="otp" placeholder="Enter OTP">

  <button onclick="verifyOTP()">Verify & Login</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://jetwvplkvkwkcetqswcj.supabase.co";
const supabaseKey = "sb_publishable_GZ37ioD42qB74R4skBs8fg_XVVOYWyK";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// STEP 1: Send OTP
async function sendOTP() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Enter email and password");
    return;
  }

  // (Password not checked here - OTP based login)
  const { error } = await supabase.auth.signInWithOtp({
    email: email
  });

  if (error) {
    alert(error.message);
  } else {
    alert("OTP sent to your email!");
  }
}

// STEP 2: Verify OTP
async function verifyOTP() {
  const email = document.getElementById("email").value;
  const otp = document.getElementById("otp").value;

  if (!otp) {
    alert("Enter OTP");
    return;
  }

  const { error } = await supabase.auth.verifyOtp({
    email: email,
    token: otp,
    type: "email"
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Login Successful!");
    window.location.href = "uid.html";
  }
}
</script>

</body>
</html>
